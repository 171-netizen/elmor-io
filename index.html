<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elemental Arena Game</title>
<style>
body { margin:0; overflow:hidden; }
canvas { display:block; }
#hud { position:absolute; top:10px; left:10px; color:white; font-family:Arial; font-size:18px; background:rgba(0,0,0,0.5); padding:8px; border-radius:8px; }
#chat { position:absolute; bottom:10px; left:10px; width:300px; max-height:200px; overflow-y:auto; background:rgba(0,0,0,0.5); color:white; font-family:Arial; padding:5px; border-radius:8px; }
#creator-tools { position:absolute; top:10px; right:10px; background:rgba(0,0,0,0.5); color:white; font-family:Arial; padding:8px; border-radius:8px; display:none; }
button { margin:5px; padding:5px 10px; }
</style>
</head>
<body>
<div id="hud"></div>
<div id="chat"></div>
<div id="creator-tools">
<h3>Creator Mode</h3>
<button id="spawnBlock">Spawn Block</button>
<button id="spawnEnemy">Spawn Enemy</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="main.js"></script>
</body>
</html>
